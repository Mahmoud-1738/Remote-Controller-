<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>RC Controller</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            font-family: monospace;
        }

        /* ── Portrait warning ─────────────────────────────── */
        #portrait-hint {
            display: none;
            position: fixed;
            inset: 0;
            background: #111;
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 15px;
            gap: 16px;
        }
        #portrait-hint .icon { font-size: 52px; }

        @media (orientation: portrait) {
            #portrait-hint { display: flex; }
            #controller    { display: none; }
        }

        /* ── Player select screen ─────────────────────────── */
        #player-select {
            display: flex;
            position: fixed;
            inset: 0;
            background: #111;
            z-index: 60;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
        }
        #player-select h2 {
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #555;
        }
        .pick-btn {
            width: 220px;
            height: 72px;
            border: 2px solid;
            border-radius: 6px;
            background: transparent;
            font-family: monospace;
            font-size: 22px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            /* Allow taps to register despite touch-action:none on body */
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s, box-shadow 0.15s;
        }
        .pick-btn.p1 { border-color: #4a9eff; color: #4a9eff; }
        .pick-btn.p1:active { background: rgba(74,158,255,0.15); box-shadow: 0 0 24px rgba(74,158,255,0.4); }
        .pick-btn.p2 { border-color: #ff5555; color: #ff5555; }
        .pick-btn.p2:active { background: rgba(255,85,85,0.15);  box-shadow: 0 0 24px rgba(255,85,85,0.4);  }
        #player-select.hidden { display: none; }

        /* ── Waiting screen (after pick, before server reply) ── */
        #waiting {
            display: none;
            position: fixed;
            inset: 0;
            background: #111;
            z-index: 50;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            gap: 14px;
        }
        #waiting .spinner {
            width: 40px; height: 40px;
            border: 3px solid #333;
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #waiting.visible  { display: flex; }
        #waiting.hidden   { display: none; }

        /* ── Player badge ─────────────────────────────────── */
        #player-badge {
            position: absolute;
            top: 7px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 10;
            pointer-events: none;
        }
        #player-badge.p1 { color: #4a9eff; }
        #player-badge.p2 { color: #ff5555; }
        #player-badge.full { color: #888; }

        /* ── Main layout ──────────────────────────────────── */
        #controller {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: stretch;
            padding: 10px;
            gap: 10px;
        }

        /* ── Status ───────────────────────────────────────── */
        #status-bar {
            position: absolute;
            top: 7px;
            right: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            color: #444;
            z-index: 10;
            pointer-events: none;
        }
        #status-dot { width: 7px; height: 7px; border-radius: 50%; background: #444; flex-shrink: 0; }
        .s-connected    #status-dot  { background: #4f4; box-shadow: 0 0 6px #4f4; }
        .s-connected    #status-text { color: #4f4; }
        .s-disconnected #status-dot  { background: #f44; }
        .s-disconnected #status-text { color: #f44; }

        /* ── LEFT: Steering ───────────────────────────────── */
        #steer-section {
            flex: 0 0 55%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #wheel-img {
            filter: invert(0.88);
            width: min(46vw, 78vh);
            max-width: 300px;
            height: auto;
            object-fit: contain;
            cursor: grab;
            transition: transform 0.06s ease-out, filter 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        #wheel-img.grabbed {
            cursor: grabbing;
            filter: invert(1);
            transition: transform 0s, filter 0.1s;
        }

        /* Turn indicator bar */
        #turn-bar-wrap {
            width: 55%;
            max-width: 200px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            position: relative;
        }
        #turn-bar {
            position: absolute;
            top: 0; bottom: 0;
            background: #4a9eff;
            border-radius: 2px;
        }

        #steer-hint {
            font-size: 10px;
            letter-spacing: 2px;
            color: #333;
            text-transform: uppercase;
        }

        /* ── RIGHT: Pedals side by side ──────────────────── */
        #pedals-section {
            flex: 1;
            display: flex;
            flex-direction: row;
            gap: 10px;
        }

        .pedal-panel {
            flex: 1;
            background: transparent;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .pedal-panel img {
            max-height: 75%;
            max-width: 100%;
            object-fit: contain;
            pointer-events: none;
            transition: transform 0.08s, filter 0.08s;
        }

        .pedal-label {
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #444;
            text-transform: uppercase;
            transition: color 0.08s;
        }

        /* Gas */
        #gas-panel.active img          { transform: scale(0.93) translateY(3px); filter: drop-shadow(0 0 14px rgba(50,220,50,0.9)); }
        #gas-panel.active .pedal-label { color: #3d3; }

        /* Brake */
        #brake-panel.active img          { transform: scale(0.93) translateY(3px); filter: drop-shadow(0 0 14px rgba(220,50,50,0.9)); }
        #brake-panel.active .pedal-label { color: #e33; }

        /* P2 tint on turn bar */
        .is-p2 #turn-bar { background: #ff5555; }
    </style>
</head>
<body>

    <div id="portrait-hint">
        <div class="icon">🔄</div>
        <div>Rotate your phone to landscape</div>
    </div>

    <!-- Step 1: choose which player you want to be -->
    <div id="player-select">
        <h2>Choose your player</h2>
        <button class="pick-btn p1" id="pick-p1">Player 1</button>
        <button class="pick-btn p2" id="pick-p2">Player 2</button>
    </div>

    <!-- Step 2: waiting for server to confirm the slot -->
    <div id="waiting">
        <div class="spinner"></div>
        <div id="waiting-text">Connecting...</div>
    </div>

    <div id="controller">
        <div id="player-badge"></div>

        <div id="status-bar">
            <div id="status-dot"></div>
            <span id="status-text">Connecting...</span>
        </div>

        <!-- LEFT: Steering wheel -->
        <div id="steer-section">
            <img id="wheel-img" src="assets/images/steeringWheel.png" draggable="false">
            <div id="turn-bar-wrap"><div id="turn-bar"></div></div>
            <div id="steer-hint">drag to steer</div>
        </div>

        <!-- RIGHT: Gas + Brake -->
        <div id="pedals-section">
            <div class="pedal-panel" id="gas-panel">
                <img src="assets/images/acceleratorPedal.png" draggable="false">
                <div class="pedal-label">Gas</div>
            </div>
            <div class="pedal-panel" id="brake-panel">
                <img src="assets/images/brakePedal.png" draggable="false">
                <div class="pedal-label">Brake</div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }

        // ── Socket ────────────────────────────────────────────────────────────
        const socket      = io();
        const statusBar   = document.getElementById('status-bar');
        const statusText  = document.getElementById('status-text');
        const waitingEl   = document.getElementById('waiting');
        const waitText    = document.getElementById('waiting-text');
        const badge       = document.getElementById('player-badge');
        const controller  = document.getElementById('controller');
        const selectScreen = document.getElementById('player-select');

        let myPlayerID  = -1;   // assigned by server after 'register'
        let myPreferred = -1;   // chosen by the player on this screen

        // ── Step 1: player taps P1 or P2 ─────────────────────────────────────
        // Use both touchend and click so it works on mobile and desktop.
        function addPickListener(id, preferred) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchend', (e) => { e.preventDefault(); pickPlayer(preferred); });
            btn.addEventListener('click',    ()  => pickPlayer(preferred));
        }
        addPickListener('pick-p1', 0);
        addPickListener('pick-p2', 1);

        function pickPlayer(preferred) {
            myPreferred = preferred;
            selectScreen.classList.add('hidden');
            waitingEl.classList.add('visible');
            waitText.textContent = 'Connecting…';
            // If socket is already connected, register immediately;
            // otherwise the 'connect' event will do it.
            if (socket.connected) {
                socket.emit('register', { preferred });
                waitText.textContent = 'Waiting for slot…';
            }
        }

        socket.on('connect', () => {
            statusBar.className = 's-connected';
            statusText.textContent = 'Connected';
            // Only register if the player has already picked a slot
            if (myPreferred !== -1) {
                socket.emit('register', { preferred: myPreferred });
                waitText.textContent = 'Waiting for slot…';
            }
        });

        socket.on('disconnect', () => {
            statusBar.className = 's-disconnected';
            statusText.textContent = 'Disconnected';
            resetAll();
        });

        socket.on('playerAssigned', (data) => {
            myPlayerID = data.playerID;
            waitingEl.classList.remove('visible');
            waitingEl.classList.add('hidden');

            if (myPlayerID === 0) {
                badge.textContent = 'Player 1';
                badge.className = 'p1';
            } else if (myPlayerID === 1) {
                badge.textContent = 'Player 2';
                badge.className = 'p2';
                controller.classList.add('is-p2');
            } else {
                // Both slots full — go back to selection
                badge.textContent = '';
                waitText.textContent = 'Slot taken — pick again.';
                waitingEl.classList.remove('hidden');
                waitingEl.classList.add('visible');
                setTimeout(() => {
                    waitingEl.classList.remove('visible');
                    waitingEl.classList.add('hidden');
                    selectScreen.classList.remove('hidden');
                    myPreferred = -1;
                }, 1800);
            }
        });

        // ── State ─────────────────────────────────────────────────────────────
        let turn        = 0;
        let gasActive   = false;
        let brakeActive = false;

        function getForward() {
            if (gasActive)   return -1;
            if (brakeActive) return  1;
            return 0;
        }

        function send() {
            if (myPlayerID === -1) return; // not yet assigned
            socket.emit('input', { forward: getForward(), turn });
        }

        function resetAll() {
            turn = 0; gasActive = false; brakeActive = false;
            gasPanel.classList.remove('active');
            brakePanel.classList.remove('active');
            wheelImg.classList.remove('grabbed');
            applySteer(0);
            send();
        }

        // ── Steering wheel ────────────────────────────────────────────────────
        const wheelImg = document.getElementById('wheel-img');
        const turnBar  = document.getElementById('turn-bar');
        const turnWrap = document.getElementById('turn-bar-wrap');
        const MAX_DRAG = 110;
        const MAX_DEG  = 90;
        let steerTouchId = null;
        let steerStartX  = 0;

        function applySteer(t) {
            turn = t;
            wheelImg.style.transform = `rotate(${-t * MAX_DEG}deg)`;
            const halfBar = Math.abs(t) * 50;
            if (t >= 0) {
                turnBar.style.left  = '50%';
                turnBar.style.width = `${halfBar}%`;
            } else {
                turnBar.style.left  = `${50 - halfBar}%`;
                turnBar.style.width = `${halfBar}%`;
            }
        }

        function steerStart(id, clientX) {
            steerTouchId = id;
            steerStartX  = clientX;
            wheelImg.classList.add('grabbed');
        }

        function steerMove(clientX) {
            const raw = (clientX - steerStartX) / MAX_DRAG;
            applySteer(Math.max(-1, Math.min(1, -raw)));
            send();
        }

        function steerEnd() {
            steerTouchId = null;
            wheelImg.classList.remove('grabbed');
            applySteer(0);
            send();
        }

        wheelImg.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (steerTouchId === null) steerStart(e.changedTouches[0].identifier, e.changedTouches[0].clientX);
        }, { passive: false });

        wheelImg.addEventListener('mousedown', (e) => steerStart('mouse', e.clientX));

        // ── Pedals ────────────────────────────────────────────────────────────
        const gasPanel   = document.getElementById('gas-panel');
        const brakePanel = document.getElementById('brake-panel');
        let gasTouchId   = null;
        let brakeTouchId = null;

        function pressGas(id)   { gasTouchId   = id;   gasActive   = true;  gasPanel.classList.add('active');   send(); }
        function pressBrake(id) { brakeTouchId = id;   brakeActive = true;  brakePanel.classList.add('active'); send(); }
        function releaseGas()   { gasTouchId   = null; gasActive   = false; gasPanel.classList.remove('active');   send(); }
        function releaseBrake() { brakeTouchId = null; brakeActive = false; brakePanel.classList.remove('active'); send(); }

        gasPanel.addEventListener('touchstart',   (e) => { e.preventDefault(); if (gasTouchId   === null) pressGas(e.changedTouches[0].identifier);   }, { passive: false });
        brakePanel.addEventListener('touchstart', (e) => { e.preventDefault(); if (brakeTouchId === null) pressBrake(e.changedTouches[0].identifier); }, { passive: false });
        gasPanel.addEventListener('mousedown',   () => pressGas('mouse'));
        brakePanel.addEventListener('mousedown', () => pressBrake('mouse'));

        // ── Global handlers ───────────────────────────────────────────────────
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (const t of e.changedTouches) {
                if (t.identifier === steerTouchId) steerMove(t.clientX);
            }
        }, { passive: false });

        function handleEnd(e) {
            e.preventDefault();
            for (const t of e.changedTouches) {
                if (t.identifier === steerTouchId) steerEnd();
                if (t.identifier === gasTouchId)   releaseGas();
                if (t.identifier === brakeTouchId) releaseBrake();
            }
        }
        document.addEventListener('touchend',    handleEnd, { passive: false });
        document.addEventListener('touchcancel', handleEnd, { passive: false });

        document.addEventListener('mousemove', (e) => { if (steerTouchId === 'mouse') steerMove(e.clientX); });
        document.addEventListener('mouseup', () => {
            if (steerTouchId === 'mouse') steerEnd();
            if (gasActive)   releaseGas();
            if (brakeActive) releaseBrake();
        });
    </script>
</body>
</html>
